<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 10px;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .figure-container {
            position: relative;
            width: 45%;
            max-width: 250px;
            text-align: center;
        }
        .figure-container h3 {
            margin-top: 0;
            color: #1E4CBD;
            font-size: 1.1rem;
        }
        .img-wrapper {
            position: relative;
            width: 100%;
            display: inline-block;
        }
        .img-wrapper img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .spot {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: rgba(226, 232, 240, 0.7);
            border: 2px solid #94a3b8;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: all 0.2s;
        }
        .spot:hover {
            background-color: rgba(203, 213, 225, 0.9);
            transform: translate(-50%, -50%) scale(1.1);
        }
        .spot.selected {
            background-color: rgba(43, 92, 217, 0.9);
            border-color: #1E4CBD;
            box-shadow: 0 0 8px rgba(43, 92, 217, 0.5);
        }
    </style>
</head>
<body>
    
    <div class="figure-container">
        <h3>Front</h3>
        <div class="img-wrapper">
            <!-- The onerror handler displays a placeholder if the image is missing -->
            <img src="body_front.png" alt="Front Body" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjQwMCI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iI2YxZjVmOSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjOTRhM2I4Ij5ib2R5X2Zyb250LnBuZzwvdGV4dD48L3N2Zz4='"/>
            
            <div class="spot" style="top: 15%; left: 50%;" data-id="Neck"></div>
            <div class="spot" style="top: 25%; left: 30%;" data-id="Shoulder (R)"></div>
            <div class="spot" style="top: 25%; left: 70%;" data-id="Shoulder (L)"></div>
            <div class="spot" style="top: 35%; left: 50%;" data-id="Chest"></div>
            <div class="spot" style="top: 55%; left: 40%;" data-id="Hip (R)"></div>
            <div class="spot" style="top: 55%; left: 60%;" data-id="Hip (L)"></div>
            
            <div class="spot" style="top: 55%; left: 15%;" data-id="Wrist (R)"></div>
            <div class="spot" style="top: 55%; left: 85%;" data-id="Wrist (L)"></div>
            
            <div class="spot" style="top: 75%; left: 35%;" data-id="Knee (R)"></div>
            <div class="spot" style="top: 75%; left: 65%;" data-id="Knee (L)"></div>
            
            <div class="spot" style="top: 95%; left: 35%;" data-id="Ankle (R)"></div>
            <div class="spot" style="top: 95%; left: 65%;" data-id="Ankle (L)"></div>
        </div>
    </div>

    <div class="figure-container">
        <h3>Back</h3>
        <div class="img-wrapper">
            <img src="body_back.png" alt="Back Body" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjQwMCI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iI2YxZjVmOSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjOTRhM2I4Ij5ib2R5X2JhY2sucG5nPC90ZXh0Pjwvc3ZnPg=='"/>
            
            <div class="spot" style="top: 15%; left: 50%;" data-id="Neck (Back)"></div>
            <div class="spot" style="top: 25%; left: 30%;" data-id="Shoulder (L)"></div>
            <div class="spot" style="top: 25%; left: 70%;" data-id="Shoulder (R)"></div>
            <div class="spot" style="top: 35%; left: 50%;" data-id="Upper Back"></div>
            <div class="spot" style="top: 50%; left: 50%;" data-id="Lower Back"></div>
            <div class="spot" style="top: 55%; left: 40%;" data-id="Hip (L)"></div>
            <div class="spot" style="top: 55%; left: 60%;" data-id="Hip (R)"></div>
            
            <div class="spot" style="top: 55%; left: 15%;" data-id="Wrist (L)"></div>
            <div class="spot" style="top: 55%; left: 85%;" data-id="Wrist (R)"></div>
            
            <div class="spot" style="top: 75%; left: 35%;" data-id="Back of Knee (L)"></div>
            <div class="spot" style="top: 75%; left: 65%;" data-id="Back of Knee (R)"></div>
            
            <div class="spot" style="top: 95%; left: 35%;" data-id="Ankle (L)"></div>
            <div class="spot" style="top: 95%; left: 65%;" data-id="Ankle (R)"></div>
        </div>
    </div>

    <script>
        // Minimal Streamlit Component Protocol
        function sendMessageToStreamlitClient(type, data) {
            window.parent.postMessage({
                isStreamlitMessage: true,
                type: type,
                ...data
            }, "*");
        }

        function setFrameHeight(height) {
            sendMessageToStreamlitClient("streamlit:setFrameHeight", { height: height });
        }

        function sendValue(data) {
            sendMessageToStreamlitClient("streamlit:setComponentValue", { value: data, dataType: "json" });
        }

        // Initialize component
        sendMessageToStreamlitClient("streamlit:componentReady", { apiVersion: 1 });

        // Update height dynamically after images load
        function adjustHeight() {
            const height = document.body.scrollHeight;
            setFrameHeight(height + 20);
        }

        window.addEventListener("message", function(event) {
            if (event.data.type === "streamlit:render") {
                setTimeout(adjustHeight, 100);
                setTimeout(adjustHeight, 1000); // Fallback for slow images
            }
        });

        // App logic
        let selectedParts = new Set();
        
        document.querySelectorAll('.spot').forEach(el => {
            el.addEventListener('click', function(e) {
                const partId = this.getAttribute('data-id');
                if (selectedParts.has(partId)) {
                    selectedParts.delete(partId);
                    this.classList.remove('selected');
                } else {
                    selectedParts.add(partId);
                    this.classList.add('selected');
                }
                sendValue(Array.from(selectedParts));
            });
        });
    </script>
</body>
</html>
